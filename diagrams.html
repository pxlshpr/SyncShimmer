<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Inter', 'SF Pro', sans-serif; background: #fff; -webkit-font-smoothing: antialiased; }
  .diagram { width: 880px; padding: 40px; }
  .timestep { margin-bottom: 48px; }
  .time-label { font-size: 20px; font-weight: 600; color: #999; margin-bottom: 12px; }
  .box {
    background: #F4F4F4; border: 1px solid #E8E8E8;
    border-radius: 12px; padding: 24px 28px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .bar { height: 18px; border-radius: 6px; background: #DCDCDC; }
  .annotation { font-size: 18px; font-weight: 600; color: #E74C3C; margin-top: 12px; white-space: nowrap; }
  .dual-row { display: flex; gap: 20px; }
  .zone-box {
    background: #F4F4F4; border: 1px solid #E8E8E8;
    border-radius: 12px; padding: 20px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .zone-box.left { flex: 0.65; }
  .zone-box.right { flex: 0.35; }
  .zone-label { font-size: 16px; font-weight: 700; color: #AAA; letter-spacing: 1.5px; margin-bottom: 4px; }
  .zone-box .bar { height: 16px; }
</style>
</head>
<body>

<div class="diagram" id="single-zone">
  <div class="timestep">
    <div class="time-label">t = 0.0s</div>
    <div class="box" id="s0"></div>
    <div class="annotation" id="s0a"></div>
  </div>
  <div class="timestep">
    <div class="time-label">t = 0.8s</div>
    <div class="box" id="s1"></div>
    <div class="annotation" id="s1a"></div>
  </div>
  <div class="timestep">
    <div class="time-label">t = 1.6s</div>
    <div class="box" id="s2"></div>
    <div class="annotation" id="s2a"></div>
  </div>
</div>

<div class="diagram" id="dual-zone">
  <div class="timestep">
    <div class="time-label">t = 0.0s — Both beams start together</div>
    <div class="dual-row" id="d0"></div>
    <div class="annotation" id="d0a"></div>
  </div>
  <div class="timestep">
    <div class="time-label">t = 0.8s — Both at 50% of their zone</div>
    <div class="dual-row" id="d1"></div>
    <div class="annotation" id="d1a"></div>
  </div>
  <div class="timestep">
    <div class="time-label">t = 1.6s — Both beams finish together</div>
    <div class="dual-row" id="d2"></div>
    <div class="annotation" id="d2a" style="text-align:center;"></div>
  </div>
</div>

<script>
function beamGrad(beamFrac, barW, bandPx) {
  return `radial-gradient(${bandPx}px 100px at ${(beamFrac*100).toFixed(1)}% 50%, #909090, #DCDCDC)`;
}

function makeBars(container, widths, beamPx, bandPx) {
  widths.forEach(w => {
    const bar = document.createElement('div');
    bar.className = 'bar';
    bar.style.width = w + 'px';
    const f = beamPx / w;
    if (f >= -0.3 && f <= 1.3) bar.style.background = beamGrad(f, w, bandPx);
    container.appendChild(bar);
  });
}

// Single zone config
const sw = [744, 580, 440, 520, 480]; // 2x of original for retina
const band = 100;
const boxPad = 28; // box padding-left

// t=0: beam at 0px from bar start
makeBars(document.getElementById('s0'), sw, 0, band);
// Arrow should point at x=0 of bars = boxPad from box left
// boxPad(28) + diagram pad(40) = 68px from diagram left
document.getElementById('s0a').innerHTML = '<span style="margin-left:28px;">↑ beam starts here</span>';

// t=0.8: beam at center = 372px (half of 744)
makeBars(document.getElementById('s1'), sw, 372, band);
// Arrow at 372px from bar start = 28+372=400px from box left
document.getElementById('s1a').innerHTML = '<span style="margin-left:370px;">↑ all bars lit at same screen X</span>';

// t=1.6: beam at 744px (right edge of longest bar)
makeBars(document.getElementById('s2'), sw, 744, band);
// Arrow at right edge of longest bar. 28+744=772 from box. Arrow text should end there.
document.getElementById('s2a').style.textAlign = 'right';
document.getElementById('s2a').style.paddingRight = '28px';
document.getElementById('s2a').innerHTML = 'beam exits right ↑';

// Dual zone
function makeDual(id, leftBeam, rightBeam) {
  const row = document.getElementById(id);
  const lw = [440, 330, 260, 360];
  const rw = [240, 170, 130, 190];
  const lb = 80, rb = 60;

  const leftBox = document.createElement('div');
  leftBox.className = 'zone-box left';
  leftBox.innerHTML = '<div class="zone-label">LEFT (65%)</div>';
  makeBars(leftBox, lw, leftBeam, lb);

  const rightBox = document.createElement('div');
  rightBox.className = 'zone-box right';
  rightBox.innerHTML = '<div class="zone-label">RIGHT (35%)</div>';
  makeBars(rightBox, rw, rightBeam, rb);

  row.appendChild(leftBox);
  row.appendChild(rightBox);
}

// d0: beams at 0
makeDual('d0', 0, 0);
// Left arrow at ~20px (zone pad), right arrow at right zone start + 20px
// Left zone width ≈ 880*0.65 - some = ~530. Right starts at ~550.
document.getElementById('d0a').innerHTML =
  '<span style="margin-left:20px;">↑ beam</span>' +
  '<span style="margin-left:510px;">↑ beam</span>';

// d1: beams at 50%
makeDual('d1', 220, 120);
// Left beam at 220px from bar start. In zone that's 20+220=240px from diagram.
// Right beam at 120px from bar start. Right zone starts at ~550, + 20 + 120 = 690
document.getElementById('d1a').innerHTML =
  '<span style="margin-left:240px;">↑ 50% of left</span>' +
  '<span style="margin-left:310px;">↑ 50% of right</span>';

// d2: beams at end
makeDual('d2', 440, 240);
// Center annotation between the two zones
document.getElementById('d2a').textContent = '↑↑ both finish together ↑↑';
</script>

</body>
</html>
