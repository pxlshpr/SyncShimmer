<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Inter', sans-serif; background: #fff; }
  .diagram { width: 500px; padding: 32px; }
  .title { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; }
  .subtitle { font-size: 12px; color: #888; margin-bottom: 28px; line-height: 1.5; }
  .timestep { margin-bottom: 28px; }
  .time-label { font-size: 11px; font-weight: 600; color: #999; margin-bottom: 8px; }
  .bar-container {
    background: #F4F4F4;
    border: 1px solid #E8E8E8;
    border-radius: 6px;
    padding: 14px;
  }
  .bar {
    height: 10px;
    border-radius: 4px;
    margin-bottom: 6px;
  }
  .bar:last-child { margin-bottom: 0; }
  .annotation {
    font-size: 10px;
    font-weight: 600;
    color: #E74C3C;
    margin-top: 8px;
  }
  .dual-row { display: flex; gap: 12px; }
  .zone-box {
    background: #F4F4F4;
    border: 1px solid #E8E8E8;
    border-radius: 6px;
    padding: 12px;
  }
  .zone-box.left { flex: 0.65; }
  .zone-box.right { flex: 0.35; }
  .zone-label {
    font-size: 9px; font-weight: 700; color: #AAA;
    letter-spacing: 1px; margin-bottom: 8px;
  }
  .zone-box .bar { height: 8px; margin-bottom: 5px; }
</style>
</head>
<body>

<div class="diagram" id="single-zone">
  <div class="title">Single Zone (.full)</div>
  <div class="subtitle">One beam sweeps left to right. All bars light up at the same screen X.</div>

  <div class="timestep" id="s0"></div>
  <div class="timestep" id="s1"></div>
  <div class="timestep" id="s2"></div>
</div>

<div class="diagram" id="dual-zone">
  <div class="title">Dual Zone (.left + .right)</div>
  <div class="subtitle">Both zones share the same 0→1 phase. They always start and restart together, even though the left zone is wider.</div>

  <div class="timestep" id="d0"></div>
  <div class="timestep" id="d1"></div>
  <div class="timestep" id="d2"></div>
</div>

<script>
// Bar widths as fractions of container inner width
const barWidths = [1.0, 0.78, 0.60, 0.70, 0.65];
const dualLeftWidths = [1.0, 0.75, 0.60, 0.80];
const dualRightWidths = [1.0, 0.70, 0.55, 0.80];

// Generate gradient for a bar given:
//   beamCenter: 0..1 position of beam center relative to container
//   barWidth: fraction of container this bar occupies (all bars left-aligned)
function barGradient(beamCenter, barWidth) {
  const bandHalf = 0.10; // half-width of band in container fraction
  // Convert container-relative beam position to bar-relative
  const localCenter = beamCenter / barWidth;
  const localHalf = bandHalf / barWidth;

  const base = '#DCDCDC';
  const hi = '#A8A8A8';
  const mid = '#C0C0C0';

  const s1 = Math.max(0, localCenter - localHalf);
  const s2 = Math.max(0, localCenter - localHalf * 0.4);
  const s3 = Math.min(1, localCenter);
  const s4 = Math.min(1, localCenter + localHalf * 0.4);
  const s5 = Math.min(1, localCenter + localHalf);

  return `linear-gradient(to right, ${base} ${(s1*100).toFixed(1)}%, ${mid} ${(s2*100).toFixed(1)}%, ${hi} ${(s3*100).toFixed(1)}%, ${mid} ${(s4*100).toFixed(1)}%, ${base} ${(s5*100).toFixed(1)}%)`;
}

function buildSingleTimestep(id, label, beamPos, annotation, annotAlign) {
  const el = document.getElementById(id);
  el.innerHTML = `<div class="time-label">${label}</div>`;
  const container = document.createElement('div');
  container.className = 'bar-container';

  barWidths.forEach(w => {
    const bar = document.createElement('div');
    bar.className = 'bar';
    bar.style.width = (w * 100) + '%';
    // Only show gradient if beam overlaps this bar
    if (beamPos <= w + 0.12) {
      bar.style.background = barGradient(beamPos, w);
    } else {
      bar.style.background = '#DCDCDC';
    }
    container.appendChild(bar);
  });

  el.appendChild(container);
  const ann = document.createElement('div');
  ann.className = 'annotation';
  ann.style.textAlign = annotAlign || 'left';
  ann.textContent = annotation;
  el.appendChild(ann);
}

// Single zone
buildSingleTimestep('s0', 't = 0.0s', 0.02, '↑ beam starts here', 'left');
buildSingleTimestep('s1', 't = 0.8s', 0.50, '↑ all bars lit at same screen X', 'center');
buildSingleTimestep('s2', 't = 1.6s', 0.95, '↑ beam exits right', 'right');

// Dual zone
function buildDualTimestep(id, label, beamFrac, annotation) {
  const el = document.getElementById(id);
  el.innerHTML = `<div class="time-label">${label}</div>`;
  const row = document.createElement('div');
  row.className = 'dual-row';

  // Left zone
  const leftBox = document.createElement('div');
  leftBox.className = 'zone-box left';
  leftBox.innerHTML = '<div class="zone-label">LEFT (65%)</div>';
  dualLeftWidths.forEach(w => {
    const bar = document.createElement('div');
    bar.className = 'bar';
    bar.style.width = (w * 100) + '%';
    if (beamFrac <= w + 0.15) {
      bar.style.background = barGradient(beamFrac, w);
    } else {
      bar.style.background = '#DCDCDC';
    }
    leftBox.appendChild(bar);
  });

  // Right zone
  const rightBox = document.createElement('div');
  rightBox.className = 'zone-box right';
  rightBox.innerHTML = '<div class="zone-label">RIGHT (35%)</div>';
  dualRightWidths.forEach(w => {
    const bar = document.createElement('div');
    bar.className = 'bar';
    bar.style.width = (w * 100) + '%';
    if (beamFrac <= w + 0.15) {
      bar.style.background = barGradient(beamFrac, w);
    } else {
      bar.style.background = '#DCDCDC';
    }
    rightBox.appendChild(bar);
  });

  row.appendChild(leftBox);
  row.appendChild(rightBox);
  el.appendChild(row);

  const ann = document.createElement('div');
  ann.className = 'annotation';
  ann.style.textAlign = 'center';
  ann.textContent = annotation;
  el.appendChild(ann);
}

buildDualTimestep('d0', 't = 0.0s — Both beams start together', 0.02, '↑ both start together');
buildDualTimestep('d1', 't = 0.8s — Both at 50% of their zone', 0.50, '↑ 50% of left                    ↑ 50% of right');
buildDualTimestep('d2', 't = 1.6s — Both beams finish together', 0.95, '↑↑ both finish together ↑↑');
</script>

</body>
</html>
