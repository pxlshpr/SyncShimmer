<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Inter', 'SF Pro', sans-serif; background: #fff; -webkit-font-smoothing: antialiased; }
  .diagram { width: 1760px; padding: 80px; }
  .timestep { margin-bottom: 96px; }
  .time-label { font-size: 40px; font-weight: 600; color: #999; margin-bottom: 24px; }
  .box {
    background: #F4F4F4; border: 1px solid #E8E8E8;
    border-radius: 24px; padding: 48px 56px;
    display: flex; flex-direction: column; gap: 40px;
  }
  .bar { height: 36px; border-radius: 12px; background: #DCDCDC; }
  .annotation { font-size: 36px; font-weight: 600; color: #E74C3C; margin-top: 24px; white-space: nowrap; }
  .dual-row { display: flex; gap: 40px; }
  .zone-box {
    background: #F4F4F4; border: 1px solid #E8E8E8;
    border-radius: 24px; padding: 40px;
    display: flex; flex-direction: column; gap: 40px;
  }
  .zone-box.left { flex: 0.65; }
  .zone-box.right { flex: 0.35; }
  .zone-label { font-size: 32px; font-weight: 700; color: #AAA; letter-spacing: 3px; margin-bottom: 8px; }
  .zone-box .bar { height: 32px; }
</style>
</head>
<body>

<div class="diagram" id="single-zone">
  <div class="timestep">
    <div class="time-label">t = 0.0s</div>
    <div class="box" id="s0"></div>
    <div class="annotation" id="s0a"></div>
  </div>
  <div class="timestep">
    <div class="time-label">t = 0.8s</div>
    <div class="box" id="s1"></div>
    <div class="annotation" id="s1a"></div>
  </div>
  <div class="timestep">
    <div class="time-label">t = 1.6s</div>
    <div class="box" id="s2"></div>
    <div class="annotation" id="s2a"></div>
  </div>
</div>

<div class="diagram" id="dual-zone">
  <div class="timestep">
    <div class="time-label">t = 0.0s — Both beams start together</div>
    <div class="dual-row" id="d0"></div>
    <div class="annotation" id="d0a"></div>
  </div>
  <div class="timestep">
    <div class="time-label">t = 0.8s — Both at 50% of their zone</div>
    <div class="dual-row" id="d1"></div>
    <div class="annotation" id="d1a"></div>
  </div>
  <div class="timestep">
    <div class="time-label">t = 1.6s — Both beams finish together</div>
    <div class="dual-row" id="d2"></div>
    <div class="annotation" id="d2a" style="text-align:center;"></div>
  </div>
</div>

<script>
function beamGrad(beamFrac, barW, bandPx) {
  return `radial-gradient(${bandPx}px 200px at ${(beamFrac*100).toFixed(1)}% 50%, #909090, #DCDCDC)`;
}

function makeBars(container, widths, beamPx, bandPx) {
  widths.forEach(w => {
    const bar = document.createElement('div');
    bar.className = 'bar';
    bar.style.width = w + 'px';
    const f = beamPx / w;
    if (f >= -0.3 && f <= 1.3) bar.style.background = beamGrad(f, w, bandPx);
    container.appendChild(bar);
  });
}

// Single zone config (all 2x for retina)
const sw = [1488, 1160, 880, 1040, 960];
const band = 200;

// t=0: beam at 0px
makeBars(document.getElementById('s0'), sw, 0, band);
document.getElementById('s0a').innerHTML = '<span style="margin-left:56px;">↑ beam starts here</span>';

// t=0.8: beam at center = 744px
makeBars(document.getElementById('s1'), sw, 744, band);
document.getElementById('s1a').innerHTML = '<span style="margin-left:740px;">↑ all bars lit at same screen X</span>';

// t=1.6: beam at 1488px (right edge)
makeBars(document.getElementById('s2'), sw, 1488, band);
document.getElementById('s2a').style.textAlign = 'right';
document.getElementById('s2a').style.paddingRight = '56px';
document.getElementById('s2a').innerHTML = 'beam exits right ↑';

// Dual zone
function makeDual(id, leftBeam, rightBeam) {
  const row = document.getElementById(id);
  const lw = [880, 660, 520, 720];
  const rw = [480, 340, 260, 380];
  const lb = 160, rb = 120;

  const leftBox = document.createElement('div');
  leftBox.className = 'zone-box left';
  leftBox.innerHTML = '<div class="zone-label">LEFT (65%)</div>';
  makeBars(leftBox, lw, leftBeam, lb);

  const rightBox = document.createElement('div');
  rightBox.className = 'zone-box right';
  rightBox.innerHTML = '<div class="zone-label">RIGHT (35%)</div>';
  makeBars(rightBox, rw, rightBeam, rb);

  row.appendChild(leftBox);
  row.appendChild(rightBox);
}

// d0: beams at 0
makeDual('d0', 0, 0);
// All 2x: Left zone ~1040px wide, right zone ~560px. Gap 40px. Right starts at ~1080px.
document.getElementById('d0a').innerHTML =
  '<span style="margin-left:40px;">↑ beam</span>' +
  '<span style="margin-left:980px;">↑ beam</span>';

// d1: beams at 50%
makeDual('d1', 440, 240);
// Left beam at 440px in zone. Right beam at 240px. Right zone starts at ~1080.
document.getElementById('d1a').innerHTML =
  '<span style="margin-left:480px;">↑ 50% of left</span>' +
  '<span style="margin-left:540px;">↑ 50% of right</span>';

// d2: beams at end
makeDual('d2', 880, 480);
// Center of gap between zones: left ends ~1040, gap 40, center ~1060
document.getElementById('d2a').style.textAlign = 'left';
document.getElementById('d2a').innerHTML = '<span style="display:inline-block;padding-left:880px;">↑↑ both finish together ↑↑</span>';
</script>

</body>
</html>
